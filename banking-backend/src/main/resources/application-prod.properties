# ============================================
# Production Profile (PostgreSQL on Render)
# Activated with: --spring.profiles.active=prod
# ============================================

# PostgreSQL Configuration (values from Render environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# Disable H2 in production
spring.h2.console.enabled=false

# CORS - update with your Vercel frontend URL
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:4200}
