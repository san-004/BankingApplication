# Render Blueprint for Banking Application Backend
services:
  - type: web
    name: banking-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: banking-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: banking-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: banking-db
          property: password
      - key: FRONTEND_URL
        value: https://your-app.vercel.app

databases:
  - name: banking-db
    plan: free
    databaseName: banking_db
